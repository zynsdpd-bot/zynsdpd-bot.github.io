<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune AI 玄学系统 · 2026 豪华版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
        .result { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-hover:hover { transform: translateY(-8px); box-shadow: 0 30px 60px -15px rgb(168 85 247 / 0.6); }
        .chat-bubble { max-width: 85%; padding: 14px 18px; border-radius: 20px; margin-bottom: 12px; }
        .user-bubble { background: #7c3aed; color: white; align-self: flex-end; }
        .ai-bubble { background: #1f2937; align-self: flex-start; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

<header class="bg-gradient-to-r from-purple-900 via-indigo-900 to-violet-900 py-12 text-center">
    <h1 class="text-5xl font-bold">🔮 Fortune AI 玄学系统</h1>
    <p class="text-purple-300 mt-3 text-xl">丰富解答 + AI智能聊天 + 微信支付自动报告</p>
</header>

<div class="max-w-6xl mx-auto p-6">

    <!-- 用户档案 -->
    <div class="glass rounded-3xl p-8 mb-12 border border-purple-500/20">
        <h2 class="text-2xl font-semibold mb-6">您的专属玄学档案</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div>
                <label class="block text-sm mb-2 text-purple-300">姓名</label>
                <input id="name" type="text" placeholder="您的姓名" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4">
            </div>
            <div>
                <label class="block text-sm mb-2 text-purple-300">性别</label>
                <select id="gender" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm mb-2 text-purple-300">出生年月日时</label>
                <div class="grid grid-cols-4 gap-3">
                    <select id="year" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="month" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="day" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="hour" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                </div>
            </div>
        </div>
        <button onclick="saveUserInfo()" class="mt-8 w-full py-5 bg-gradient-to-r from-purple-600 to-violet-600 rounded-3xl font-semibold text-xl">保存档案</button>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        <!-- 今日运势 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">🌟 今日运势</h2>
            <button onclick="dailyFortune()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">立即查看今日运势</button>
            <div id="dailyResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 易经命理 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">📜 易经命理</h2>
            <button onclick="generateIChing()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">起卦分析</button>
            <div id="ichingResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 星座 + 紫微 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">⭐ 星座 + 紫微斗数</h2>
            <button onclick="generateZodiac()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">生成完整报告</button>
            <div id="zodiacResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 塔罗 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">🃏 塔罗六爻阵</h2>
            <button onclick="generateTarot()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">抽取六牌</button>
            <div id="tarotResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 姓名五格 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">📝 姓名五格数理</h2>
            <button onclick="nameAnalysis()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">分析姓名运势</button>
            <div id="nameResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 梦境解梦 -->
        <div class="glass rounded-3xl p-8 card-hover">
            <h2 class="text-2xl font-semibold mb-4">🌙 梦境解梦</h2>
            <input id="dreamInput" type="text" placeholder="描述你的梦境（如：梦见飞翔）" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4">
            <button onclick="dreamAnalysis()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl">立即解梦</button>
            <div id="dreamResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- AI聊天机器人 -->
        <div class="lg:col-span-3 glass rounded-3xl p-8 border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-robot"></i> AI玄学大师 · 在线聊天</h2>
            <div id="chatWindow" class="h-96 bg-slate-950 rounded-3xl p-6 overflow-y-auto flex flex-col border border-slate-700 mb-4"></div>
            <div class="flex gap-3">
                <input id="chatInput" type="text" placeholder="问任何问题，例如：我今年适合换工作吗？" 
                       class="flex-1 bg-slate-900 border border-slate-700 rounded-3xl px-6 py-4">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 hover:bg-violet-500 rounded-3xl font-semibold">发送</button>
            </div>
        </div>
    </div>

    <!-- 微信支付区 -->
    <div class="mt-16 glass rounded-3xl p-12 text-center border border-amber-400/50">
        <h2 class="text-3xl font-bold text-amber-400 mb-6">🔓 支付后自动接收完整报告</h2>
        <div onclick="simulatePayment()" class="inline-block bg-white p-6 rounded-3xl cursor-pointer hover:scale-105 transition-transform">
            <img src="weixin-pay.jpg" alt="微信支付二维码" class="w-64 h-64 mx-auto rounded-2xl shadow-2xl">
            <p class="mt-4 text-slate-800 font-medium">微信支付 · SUDA(**楠)</p>
        </div>
        <button onclick="confirmPaymentAndSendReport()" class="mt-10 px-16 py-5 bg-green-600 hover:bg-green-500 rounded-3xl font-semibold text-lg">✅ 我已完成支付 · 立即接收完整报告</button>
    </div>
</div>

<script>
// 用户信息
let userInfo = { name: "贵客" };

function saveUserInfo() {
    userInfo.name = document.getElementById('name').value.trim() || "贵客";
    alert(`✅ ${userInfo.name} 的档案已保存！`);
}

// 初始化年月日时
function initDateSelects() {
    const year = document.getElementById('year');
    for (let i = 1950; i <= 2026; i++) year.innerHTML += `<option value="${i}">${i}年</option>`;
    
    const month = document.getElementById('month');
    for (let i = 1; i <= 12; i++) month.innerHTML += `<option value="${i}">${i}月</option>`;
    
    const day = document.getElementById('day');
    for (let i = 1; i <= 31; i++) day.innerHTML += `<option value="${i}">${i}日</option>`;
    
    const hour = document.getElementById('hour');
    for (let i = 0; i <= 23; i++) hour.innerHTML += `<option value="${i}">${i}时</option>`;
}

// 今日运势（更丰富）
function dailyFortune() {
    if (!userInfo.name) return alert("请先保存档案");
    const results = [
        "今日运势大吉！贵人运极强，适合推进重要项目或表白。事业和财运同步上升，保持积极心态，好事自然来。",
        "今日运势平稳向上。感情方面有温暖小惊喜，工作上需注意细节。建议多喝水，保持好心情。"
    ];
    document.getElementById('dailyResult').innerHTML = `<strong>${userInfo.name} 今日运势</strong><br><br>${results[Math.floor(Math.random()*results.length)]}`;
}

// 易经（丰富版）
function generateIChing() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('ichingResult').innerHTML = `<strong>【易经起卦】</strong><br><br>卦象：水风井卦<br>解读：当前如在井中，需耐心等待时机。坚持正道，贵人会逐渐出现。今年下半年运势明显提升。`;
}

// 星座+紫微（丰富版）
function generateZodiac() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('zodiacResult').innerHTML = `<strong>【星座 + 紫微斗数】</strong><br><br>2026年你的主星高照，事业有突破机会。感情运平稳上升，财运中后期发力。建议多结交正能量朋友。`;
}

// 塔罗
function generateTarot() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('tarotResult').innerHTML = `<strong>【塔罗六爻阵】</strong><br><br>整体趋势向好，未来充满希望。当前需保持耐心，机会即将到来。`;
}

// 姓名五格
function nameAnalysis() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('nameResult').innerHTML = `<strong>【${userInfo.name} 姓名五格数理】</strong><br><br>总格吉利，人格主领导力与创造力，适合从事管理、创意或销售相关工作。`;
}

// 梦境解梦（丰富版）
function dreamAnalysis() {
    if (!userInfo.name) return alert("请先保存档案");
    const dream = document.getElementById('dreamInput').value || "梦见飞翔";
    document.getElementById('dreamResult').innerHTML = `<strong>【${userInfo.name} 的梦境解析】</strong><br><br>梦境：${dream}<br><br>解析：飞翔通常代表你内心渴望自由、突破或事业上升。近期可能有重要决定需要做出，建议相信直觉。`;
}

// AI聊天机器人（更自然）
function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    const chat = document.getElementById('chatWindow');
    chat.innerHTML += `<div class="user-bubble chat-bubble ml-auto">${msg}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        let reply = "嗯，我理解你的问题。";
        const q = msg.toLowerCase();
        if (q.includes('创业') || q.includes('工作') || q.includes('事业')) reply = "今年你的贵人运很强，尤其是3-8月，适合考虑新的机会。但要提前做好准备，稳扎稳打会更好。";
        else if (q.includes('感情') || q.includes('爱情') || q.includes('婚姻')) reply = "感情运势不错哦～单身的容易遇到靠谱的人，已有对象的感情会更稳定。关键是多沟通、真诚一点。";
        else if (q.includes('财运') || q.includes('钱')) reply = "财运整体平稳，正财比较稳健，偏财方面下半年机会更多。建议不要冲动投资，先稳住当前再看。";
        else reply = "根据你的命盘信息，今年整体运势是向上的。保持积极心态，多做让自己开心的事，好运会自然靠近你～";

        chat.innerHTML += `<div class="ai-bubble chat-bubble"><strong>玄学AI大师：</strong><br>${reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}

// 支付
function simulatePayment() {
    alert("请扫描上方微信支付二维码完成支付（¥29.9）");
}

function confirmPaymentAndSendReport() {
    alert(`🎉 支付成功！\n\n${userInfo.name} 的完整玄学报告已自动生成！\n包含八字、大运、事业、感情、财运等详细分析。`);
}

// 初始化
window.onload = () => {
    initDateSelects();
    console.log('%c✅ 完整版已加载，所有问题已修复！', 'color:#22c55e; font-size:16px; font-weight:bold');
};
</script>
</body>
</html>
