<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune AI 玄学系统</title>

<style>
html,body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:8px;
    margin-top:8px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;
    background:#111827;
    color:#e2e8f0;
    outline:none;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
    border:none;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:10px;
    white-space:pre-wrap;
    background:#0b1220;
    padding:12px;
    border-radius:8px;
    line-height:1.6;
}

small{color:#94a3b8;}
</style>
</head>

<body>

<header>
<h1>🔮 Fortune AI 玄学分析系统</h1>
<small>免费分析 + AI结构报告 + 付费深度解读</small>
</header>

<div class="container">

<!-- 用户信息 -->
<div class="card">
<h2>基础信息</h2>
<input id="name" placeholder="姓名">

<select id="year"></select>
<select id="month"></select>
<select id="day"></select>
<select id="hour"></select>

<select id="gender">
<option>男</option>
<option>女</option>
</select>

<button onclick="saveUser()">保存信息</button>
</div>

<!-- 易经 -->
<div class="card">
<h2>📜 易经命理分析（免费）</h2>
<button onclick="generateIChing()">生成分析</button>
<div id="iching" class="result"></div>
</div>

<!-- 星座 -->
<div class="card">
<h2>⭐ 星座分析（免费）</h2>
<button onclick="generateZodiac()">生成星座</button>
<div id="zodiac" class="result"></div>
</div>

<!-- 塔罗 -->
<div class="card">
<h2>🃏 塔罗三牌（免费）</h2>
<button onclick="generateTarot()">抽取</button>
<div id="tarot" class="result"></div>
</div>

<!-- 面相 -->
<div class="card">
<h2>👁 面相分析（免费体验版）</h2>
<button onclick="faceAnalysis()">生成面相分析</button>
<div id="face" class="result"></div>
<small>高级版：AI五官识别分析（开发中）</small>
</div>

<!-- 付费模块 -->
<div class="card">
<h2>🔒 八字深度分析（¥19.9）</h2>
<button onclick="unlock('bazi')">解锁</button>
<div id="bazi" class="result"></div>
</div>

<div class="card">
<h2>💞 感情婚姻分析（¥9.9）</h2>
<button onclick="unlock('love')">解锁</button>
<div id="love" class="result"></div>
</div>

<div class="card">
<h2>💰 财运分析（¥9.9）</h2>
<button onclick="unlock('money')">解锁</button>
<div id="money" class="result"></div>
</div>

</div>

<script>

let user = {};

function requireUser(){
    if(!user.name){
        alert("请先保存基础信息");
        return false;
    }
    return true;
}

// 初始化下拉
(function init(){
    let y=document.getElementById("year");
    for(let i=1950;i<=2026;i++)y.innerHTML+=`<option>${i}</option>`;

    let m=document.getElementById("month");
    for(let i=1;i<=12;i++)m.innerHTML+=`<option>${i}</option>`;

    let d=document.getElementById("day");
    for(let i=1;i<=31;i++)d.innerHTML+=`<option>${i}</option>`;

    let h=document.getElementById("hour");
    for(let i=0;i<=23;i++)h.innerHTML+=`<option>${i}</option>`;
})();

function saveUser(){

    window.onload = function(){

    let y=document.getElementById("year");
    let m=document.getElementById("month");
    let d=document.getElementById("day");
    let h=document.getElementById("hour");

    for(let i=1950;i<=2026;i++){
        y.innerHTML += `<option value="${i}">${i}</option>`;
    }

    for(let i=1;i<=12;i++){
        m.innerHTML += `<option value="${i}">${i}</option>`;
    }

    for(let i=1;i<=31;i++){
        d.innerHTML += `<option value="${i}">${i}</option>`;
    }

    for(let i=0;i<=23;i++){
        h.innerHTML += `<option value="${i}">${i}</option>`;
    }
}

function getZodiac(m,d){
    m=parseInt(m);d=parseInt(d);
    if((m==1&&d<=19)||(m==12&&d>=22))return"摩羯座";
    if((m==1&&d>=20)||(m==2&&d<=18))return"水瓶座";
    if((m==2&&d>=19)||(m==3&&d<=20))return"双鱼座";
    if((m==3&&d>=21)||(m==4&&d<=19))return"白羊座";
    if((m==4&&d>=20)||(m==5&&d<=20))return"金牛座";
    if((m==5&&d>=21)||(m==6&&d<=21))return"双子座";
    if((m==6&&d>=22)||(m==7&&d<=22))return"巨蟹座";
    if((m==7&&d>=23)||(m==8&&d<=22))return"狮子座";
    if((m==8&&d>=23)||(m==9&&d<=22))return"处女座";
    if((m==9&&d>=23)||(m==10&&d<=23))return"天秤座";
    if((m==10&&d>=24)||(m==11&&d<=22))return"天蝎座";
    return"射手座";
}

function generateZodiac(){
    if(!requireUser()) return;

    let z = getZodiac(user.month,user.day);

    document.getElementById("zodiac").innerText =
`【${z} 深度星座分析】

◆ 性格结构
你属于“理性 + 感性混合型人格”，外冷内热。

◆ 情绪模式
- 表面稳定
- 内心敏感
- 容易反复思考

◆ 事业模式
适合：
✔ 稳定成长型岗位
✔ 有长期积累的行业
不适合频繁变化环境

◆ 情感模式
慢热型，不轻易开始关系，但一旦开始较稳定

◆ 人生建议
避免情绪决策，多用逻辑判断方向`;
}

function generateTarot(){

    if(!requireUser()) return;

    let c=["愚者","魔术师","恋人","太阳","月亮","世界","命运之轮"];
    let r=()=>c[Math.floor(Math.random()*c.length)];

    let past=r(),now=r(),future=r();

    document.getElementById("tarot").innerText =
`【塔罗三牌深度解读】

◆ 过去：${past}
代表你过去的选择影响仍在延续，但影响正在减弱。

◆ 现在：${now}
当前处于关键选择期，这是转折点。

◆ 未来：${future}
未来结果取决于当前决策方向。

◆ 总结
你正处于“变化期”，不建议冲动决策，需要观察再行动。`;
}
}

function generateIChing(){
    if(!requireUser()) return;

    document.getElementById("iching").innerText =
`【易经命理分析】

◆ 性格结构
稳中求进型，适合长期发展。

◆ 事业
适合稳定行业（技术 / 管理 / 贸易）

◆ 财运
正财稳定，不适合投机

◆ 建议
长期坚持比频繁变化更重要`;
}

function faceAnalysis(){
    if(!requireUser()) return;

    document.getElementById("face").innerText =
`【面相分析】

额头：事业稳定型
眼睛：理性思维型
鼻子：稳定财运型
下巴：晚运较好

总结：适合长期发展路线`;
}

function unlock(t){
    if(!requireUser()) return;

    if(t=="bazi")
        bazi.innerText=`【八字深度分析】\n性格：稳重型\n事业：长期发展型\n财运：正财为主\n建议：避免短线投机`;

    if(t=="love")
        love.innerText=`【感情分析】\n慢热稳定型关系\n适合长期伴侣\n避免冲动选择`;

    if(t=="money")
        money.innerText=`【财运分析】\n正财稳定\n适合长期积累\n不适合高风险投资`;
}

</script>

</body>
</html>
