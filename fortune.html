<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune AI 玄学系统 · 2026 升级版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); }
        .result { animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-hover:hover { transform: translateY(-6px); box-shadow: 0 25px 50px -12px rgb(168 85 247); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen">

<header class="bg-gradient-to-r from-purple-900 via-indigo-900 to-violet-900 py-10 text-center border-b border-purple-500/30">
    <div class="max-w-4xl mx-auto px-6">
        <h1 class="text-5xl font-bold flex items-center justify-center gap-4">
            🔮 Fortune AI 玄学系统
        </h1>
        <p class="text-purple-300 mt-3 text-xl">AI 驱动 · 12大玄学模块 · 免费 + 付费深度报告</p>
        <div class="inline-flex items-center gap-2 bg-white/10 text-white text-sm px-5 py-2 rounded-3xl mt-6">
            <span class="animate-pulse">●</span> 已为 128,456 人生成专属玄学报告
        </div>
    </div>
</header>

<div class="max-w-5xl mx-auto p-6">

    <!-- 用户信息 -->
    <div class="glass rounded-3xl p-8 mb-10 border border-purple-500/20">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fa-solid fa-user-circle"></i> 您的专属玄学档案</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
            <div>
                <label class="block text-sm mb-2 text-purple-300">姓名</label>
                <input id="name" type="text" placeholder="您的姓名" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm mb-2 text-purple-300">性别</label>
                <select id="gender" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500">
                    <option value="男">♂ 男</option>
                    <option value="女">♀ 女</option>
                </select>
            </div>
            <div>
                <label class="block text-sm mb-2 text-purple-300">出生年月日时</label>
                <div class="grid grid-cols-4 gap-3">
                    <select id="year" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="month" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="day" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                    <select id="hour" class="bg-slate-900 border border-slate-700 rounded-2xl px-4 py-4 text-sm"></select>
                </div>
            </div>
        </div>
        <button onclick="saveUserInfo()" class="mt-8 w-full py-5 bg-gradient-to-r from-purple-600 to-violet-600 hover:brightness-110 rounded-3xl font-semibold text-xl transition-all flex items-center justify-center gap-3">
            <i class="fa-solid fa-save"></i> 保存档案 · 开始玄学之旅
        </button>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        <!-- 1. 今日运势 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-sun"></i> 今日运势</h2>
            <button onclick="dailyFortune()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">立即查看今日运势</button>
            <div id="dailyResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 2. 易经 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-book"></i> 易经命理</h2>
            <button onclick="generateIChing()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">起卦分析</button>
            <div id="ichingResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 3. 星座 + 紫微斗数 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-star"></i> 星座 + 紫微斗数</h2>
            <button onclick="generateZodiac()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">生成完整报告</button>
            <div id="zodiacResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 4. 塔罗 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-cards"></i> 塔罗六爻阵</h2>
            <button onclick="generateTarot()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">抽取六牌</button>
            <div id="tarotResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 5. 姓名五格 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-pen"></i> 姓名五格数理</h2>
            <button onclick="nameAnalysis()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">分析姓名运势</button>
            <div id="nameResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 6. 手相 + 面相 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-hand"></i> 手相 · 面相合参</h2>
            <button onclick="palmFaceAnalysis()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">生成手面相报告</button>
            <div id="palmResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 7. 风水小贴士 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-home"></i> 家居风水指南</h2>
            <button onclick="fengShuiTips()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">获取专属风水建议</button>
            <div id="fengResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

        <!-- 8. 梦境解梦 -->
        <div class="glass rounded-3xl p-8 border border-purple-500/20 card-hover">
            <h2 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-cloud-moon"></i> 梦境解梦</h2>
            <input id="dreamInput" type="text" placeholder="描述你的梦境（如：梦见飞翔）" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4 text-sm">
            <button onclick="dreamAnalysis()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-medium">解梦</button>
            <div id="dreamResult" class="result mt-6 text-sm leading-relaxed"></div>
        </div>

    </div>

    <!-- 付费深度模块 -->
    <div class="mt-16">
        <h2 class="text-3xl font-bold mb-8 text-amber-400 flex items-center gap-3"><i class="fa-solid fa-lock"></i> 付费深度玄学报告</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass rounded-3xl p-8 border border-amber-400/30 card-hover">
                <h3 class="text-xl font-semibold">八字 + 大运流年</h3>
                <div class="text-4xl font-bold text-amber-400 my-4">¥29.9</div>
                <button onclick="unlockPaid('bazi')" class="w-full py-4 bg-amber-600 hover:bg-amber-500 rounded-3xl">立即解锁完整报告</button>
                <div id="baziResult" class="result mt-6 text-sm"></div>
            </div>
            <div class="glass rounded-3xl p-8 border border-pink-400/30 card-hover">
                <h3 class="text-xl font-semibold">感情桃花 + 婚姻</h3>
                <div class="text-4xl font-bold text-pink-400 my-4">¥19.9</div>
                <button onclick="unlockPaid('love')" class="w-full py-4 bg-pink-600 hover:bg-pink-500 rounded-3xl">立即解锁</button>
                <div id="loveResult" class="result mt-6 text-sm"></div>
            </div>
            <div class="glass rounded-3xl p-8 border border-emerald-400/30 card-hover">
                <h3 class="text-xl font-semibold">财运 + 事业规划</h3>
                <div class="text-4xl font-bold text-emerald-400 my-4">¥19.9</div>
                <button onclick="unlockPaid('money')" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl">立即解锁</button>
                <div id="moneyResult" class="result mt-6 text-sm"></div>
            </div>
        </div>
    </div>
</div>

<footer class="text-center py-12 text-purple-400 text-sm border-t border-purple-500/20 mt-20">
    © 2026 Fortune AI · 纯娱乐参考 · 祝你好运连连
</footer>

<script>
// 用户档案
let userInfo = {};

// 初始化下拉框
function initSelects() {
    // 年份
    const yearEl = document.getElementById('year');
    for (let i = 1950; i <= 2026; i++) yearEl.innerHTML += `<option value="${i}">${i}</option>`;
    // 月份
    const monthEl = document.getElementById('month');
    for (let i = 1; i <= 12; i++) monthEl.innerHTML += `<option value="${i}">${i}月</option>`;
    // 日
    const dayEl = document.getElementById('day');
    for (let i = 1; i <= 31; i++) dayEl.innerHTML += `<option value="${i}">${i}日</option>`;
    // 时辰
    const hourEl = document.getElementById('hour');
    for (let i = 0; i <= 23; i++) hourEl.innerHTML += `<option value="${i}">${i}时</option>`;
}

// 保存用户信息
function saveUserInfo() {
    userInfo = {
        name: document.getElementById('name').value.trim() || "贵客",
        gender: document.getElementById('gender').value,
        year: document.getElementById('year').value,
        month: document.getElementById('month').value,
        day: document.getElementById('day').value,
        hour: document.getElementById('hour').value
    };
    if (!userInfo.name) return alert("请输入姓名");
    alert(`✅ 档案已保存！\n${userInfo.name}，欢迎来到你的专属玄学世界`);
}

// 1. 今日运势
function dailyFortune() {
    if (!userInfo.name) return alert("请先保存档案");
    const fortunes = [
        `🌟 今日整体运势：${['大吉','中吉','小吉'][Math.floor(Math.random()*3)]}\n事业：贵人助力强，适合主动出击\n爱情：桃花运旺，单身者易遇良缘\n财运：正财稳健，偏财有惊喜\n健康：注意休息，多喝温水`,
        `🌙 今日运势平稳上升\n建议佩戴${['紫水晶','黑曜石','绿幽灵'][Math.floor(Math.random()*3)]}提升运势`,
        `🔥 今日为“突破日”\n适合签合同、面试、表白`
    ];
    document.getElementById('dailyResult').innerHTML = `<strong>【${userInfo.name} 今日运势】</strong><br><br>${fortunes[Math.floor(Math.random()*fortunes.length)]}`;
}

// 2. 易经
function generateIChing() {
    if (!userInfo.name) return alert("请先保存档案");
    const gua = ["山地剥卦", "水天需卦", "风水涣卦", "雷地豫卦"][Math.floor(Math.random()*4)];
    document.getElementById('ichingResult').innerHTML = `<strong>【${userInfo.name} · ${gua}】</strong><br><br>卦辞：${['宜守成','宜进取','宜静待','宜行动'][Math.floor(Math.random()*4)]}<br><br>事业：长期规划有利<br>感情：沟通为上<br>财运：正财为主，忌投机`;
}

// 3. 星座 + 紫微
function generateZodiac() {
    if (!userInfo.name) return alert("请先保存档案");
    const zodiacs = ["狮子座","天秤座","天蝎座","射手座","摩羯座","水瓶座","双鱼座","白羊座","金牛座","双子座","巨蟹座","处女座"];
    const z = zodiacs[Math.floor(Math.random()*12)];
    document.getElementById('zodiacResult').innerHTML = `<strong>【${z} · 紫微斗数合参】</strong><br><br>主星：${['紫微','天机','太阳','武曲','廉贞'][Math.floor(Math.random()*5)]}<br>2026年大运：中上，事业高峰期<br>爱情：${userInfo.gender==='男'?'桃花正旺':'感情稳定提升'}<br>财运：偏财机会多`;
}

// 4. 塔罗六牌
function generateTarot() {
    if (!userInfo.name) return alert("请先保存档案");
    const cards = ["愚者","魔术师","女祭司","皇后","皇帝","恋人","战车","力量","隐士","命运之轮","正义","倒吊人","死亡","节制","恶魔","塔","星星","月亮","太阳","审判","世界"];
    let html = `<strong>【${userInfo.name} 塔罗六牌阵】</strong><br><br>`;
    for (let i = 1; i <= 6; i++) {
        html += `第${i}牌：${cards[Math.floor(Math.random()*cards.length)]} —— `;
        html += ['过去影响','当前状态','潜在挑战','外部助力','内在建议','最终结果'][i-1] + '<br>';
    }
    document.getElementById('tarotResult').innerHTML = html;
}

// 5. 姓名五格
function nameAnalysis() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('nameResult').innerHTML = `<strong>【${userInfo.name} 姓名五格数理】</strong><br><br>天格：${Math.floor(Math.random()*10)+10}（${['吉','半吉','凶'][Math.floor(Math.random()*3)]}）<br>人格：${Math.floor(Math.random()*10)+15}（领导力强）<br>地格：${Math.floor(Math.random()*10)+8}（财运基础好）<br>外格：${Math.floor(Math.random()*10)+12}（人际和谐）<br>总格：${Math.floor(Math.random()*20)+30}（大器晚成型）`;
}

// 6. 手相 + 面相
function palmFaceAnalysis() {
    if (!userInfo.name) return alert("请先保存档案");
    document.getElementById('palmResult').innerHTML = `<strong>【${userInfo.name} 手面相合参】</strong><br><br>掌纹：事业线清晰 → 中年事业有成<br>面相：额宽鼻挺 → 财运中后期发力<br>手相：智慧线长 → 思维敏捷<br>综合建议：适合${['管理','创意','技术'][Math.floor(Math.random()*3)]}方向发展`;
}

// 7. 风水
function fengShuiTips() {
    if (!userInfo.name) return alert("请先保存档案");
    const tips = [
        "卧室床头朝北可提升睡眠质量与事业运",
        "客厅摆放绿植可招财聚气",
        "书桌背后有靠山位，事业更稳",
        "厨房保持干净明亮，避免财运外泄"
    ];
    document.getElementById('fengResult').innerHTML = `<strong>【${userInfo.name} 专属风水建议】</strong><br><br>${tips[Math.floor(Math.random()*tips.length)]}<br><br>小贴士：每周开窗通风20分钟，增强正能量`;
}

// 8. 梦境解梦
function dreamAnalysis() {
    if (!userInfo.name) return alert("请先保存档案");
    const dream = document.getElementById('dreamInput').value.trim() || "梦见飞翔";
    const interpretations = [
        "飞翔：代表渴望自由或事业即将突破",
        "掉落：暗示近期压力较大，需放松",
        "水：象征情感流动或财运变化",
        "火：代表激情或需要注意健康"
    ];
    document.getElementById('dreamResult').innerHTML = `<strong>【${userInfo.name} 的梦境解梦】</strong><br><br>梦境：${dream}<br><br>解析：${interpretations[Math.floor(Math.random()*interpretations.length)]}<br><br>玄学建议：睡前默念“心静自然凉”可改善梦境`;
}

// 付费解锁
function unlockPaid(type) {
    if (!userInfo.name) return alert("请先保存档案");
    let msg = '';
    if (type === 'bazi') msg = '八字+大运流年完整报告（含10年运势图）已生成！（支付后查看完整版）';
    else if (type === 'love') msg = '感情桃花+婚姻匹配度报告已生成！（支付后查看完整版）';
    else if (type === 'money') msg = '财运事业十年规划报告已生成！（支付后查看完整版）';
    alert(`🔓 ${msg}\n\n（此为演示版，实际项目可接入微信/支付宝支付）`);
}

// 初始化
window.onload = () => {
    initSelects();
    console.log('%cFortune AI 玄学系统 · 12大模块已全面升级', 'color:#a855f7;font-size:16px;font-weight:bold');
};
</script>
</body>
</html>
