<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune AI 玄学分析系统</title>

<style>
html,body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:8px;
    margin-top:8px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;
    background:#111827;
    color:#e2e8f0;
    outline:none;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:10px;
    white-space:pre-wrap;
    background:#0b1220;
    padding:12px;
    border-radius:8px;
    line-height:1.6;
}

small{color:#94a3b8;}
</style>
</head>

<body>

<header>
<h1>🔮 Fortune AI 玄学分析系统</h1>
<small>免费体验 + AI升级报告 + 面相分析系统</small>
</header>

<div class="container">

<!-- 用户信息 -->
<div class="card">
<h2>基础信息</h2>
<input id="name" placeholder="姓名">
<select id="year"></select>
<select id="month"></select>
<select id="day"></select>
<select id="hour"></select>
<select id="gender">
<option>男</option>
<option>女</option>
</select>
<button onclick="saveUser()">保存信息</button>
</div>

<!-- 易经 -->
<div class="card">
<h2>📜 易经命理分析（免费）</h2>
<button onclick="generateIChing()">生成分析</button>
<div id="iching" class="result"></div>
</div>

<!-- 星座 -->
<div class="card">
<h2>⭐ 星座分析（免费）</h2>
<button onclick="generateZodiac()">生成星座</button>
<div id="zodiac" class="result"></div>
</div>

<!-- 塔罗 -->
<div class="card">
<h2>🃏 塔罗三牌（免费）</h2>
<button onclick="generateTarot()">抽取</button>
<div id="tarot" class="result"></div>
</div>

<!-- 面相 -->
<div class="card">
<h2>👁 面相分析（免费体验版）</h2>
<button onclick="faceAnalysis()">生成面相分析</button>
<div id="face" class="result"></div>
<small>升级AI版本：可上传照片进行五官识别分析</small>
</div>

<!-- 付费模块 -->
<div class="card">
<h2>🔒 八字深度分析（¥19.9）</h2>
<button onclick="unlock('bazi')">解锁</button>
<div id="bazi" class="result"></div>
</div>

<div class="card">
<h2>💞 感情婚姻分析（¥9.9）</h2>
<button onclick="unlock('love')">解锁</button>
<div id="love" class="result"></div>
</div>

<div class="card">
<h2>💰 财运分析（¥9.9）</h2>
<button onclick="unlock('money')">解锁</button>
<div id="money" class="result"></div>
</div>

</div>

<script>
let user = {};

// 初始化日期选择
(function init(){
    let y=document.getElementById("year");
    for(let i=1950;i<=2026;i++)y.innerHTML+=`<option>${i}</option>`;

    let m=document.getElementById("month");
    for(let i=1;i<=12;i++)m.innerHTML+=`<option>${i}</option>`;

    let d=document.getElementById("day");
    for(let i=1;i<=31;i++)d.innerHTML+=`<option>${i}</option>`;

    let h=document.getElementById("hour");
    for(let i=0;i<=23;i++)h.innerHTML+=`<option>${i}</option>`;
})();

function saveUser(){
    user.name=name.value;
    user.year=year.value;
    user.month=month.value;
    user.day=day.value;
    user.hour=hour.value;
    user.gender=gender.value;
    alert("信息已保存");
}

function getZodiac(m,d){
    m=parseInt(m);d=parseInt(d);
    if((m==1&&d<=19)||(m==12&&d>=22))return"摩羯座";
    if((m==1&&d>=20)||(m==2&&d<=18))return"水瓶座";
    if((m==2&&d>=19)||(m==3&&d<=20))return"双鱼座";
    if((m==3&&d>=21)||(m==4&&d<=19))return"白羊座";
    if((m==4&&d>=20)||(m==5&&d<=20))return"金牛座";
    if((m==5&&d>=21)||(m==6&&d<=21))return"双子座";
    if((m==6&&d>=22)||(m==7&&d<=22))return"巨蟹座";
    if((m==7&&d>=23)||(m==8&&d<=22))return"狮子座";
    if((m==8&&d>=23)||(m==9&&d<=22))return"处女座";
    if((m==9&&d>=23)||(m==10&&d<=23))return"天秤座";
    if((m==10&&d>=24)||(m==11&&d<=22))return"天蝎座";
    return"射手座";
}

function generateZodiac(){
    if(!user.month)return alert("先保存信息");
    zodiac.innerText=`你的星座：${getZodiac(user.month,user.day)}\n\n性格：理性与情绪平衡型\n建议：适合稳定发展路线`;
}

function generateTarot(){
    let c=["愚者","魔术师","恋人","太阳","月亮","世界"];
    let r=()=>c[Math.floor(Math.random()*c.length)];
    tarot.innerText=`过去:${r()}\n现在:${r()}\n未来:${r()}\n\n提示：当前处于选择与转折期`;
}

function generateIChing(){
    if(!user.name)return alert("先保存信息");
    iching.innerText=`【易经分析】\n稳中发展型命格\n事业：长期积累型\n财运：正财稳定\n建议：避免短期投机`;
}

function faceAnalysis(){
    if(!user.name)return alert("先保存信息");
    face.innerText=`【面相分析】\n额头：事业稳定型\n眼睛：理性思维型\n鼻子：稳定财运型\n下巴：晚运较佳\n\n总结：适合长期发展路线`;
}

function unlock(t){
    if(!user.name)return alert("先保存信息");
    if(t=="bazi")bazi.innerText="八字：中后期上升型，适合长期发展";
    if(t=="love")love.innerText="感情：慢热稳定，适合长期关系";
    if(t=="money")money.innerText="财运：正财为主，稳健型收入";
}
</script>

</body>
</html>
