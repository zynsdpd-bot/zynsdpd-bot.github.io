<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日运势测算</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white text-center p-6">

<h1 class="text-3xl font-bold mb-4">🔮 今日运势测算</h1>
<p class="text-gray-300 mb-6">填写信息，查看你的专属运势</p>

<!-- 输入区 -->
<div class="space-y-4">

<input id="name" placeholder="请输入姓名（可选）"
class="p-3 rounded text-black w-64">

<br>

<select id="gender" class="p-3 rounded text-black w-64">
<option value="">选择性别</option>
<option value="男">男</option>
<option value="女">女</option>
</select>

<br>

<input id="age" placeholder="请输入年龄"
class="p-3 rounded text-black w-64">

<br>

<select id="marriage" class="p-3 rounded text-black w-64">
<option value="">婚姻状态</option>
<option value="单身">单身</option>
<option value="恋爱中">恋爱中</option>
<option value="已婚">已婚</option>
</select>

</div>

<br>

<button onclick="start()"
class="bg-purple-600 px-8 py-3 rounded text-lg">
立即测算
</button>

<!-- 加载提示 -->
<p id="loading" class="mt-6 text-yellow-400"></p>

<!-- 结果 -->
<div id="result" class="mt-6 text-left max-w-md mx-auto"></div>

<!-- 付费区 -->
<div id="vip" class="mt-8 hidden">

<h2 class="text-2xl text-yellow-400">🔒 高级运势已生成</h2>

<p class="mt-4 text-gray-300">
✔ 财运详细分析  
✔ 事业发展趋势  
✔ 感情走向判断  
✔ 未来关键提醒  
</p>

<p class="mt-4 text-red-400 text-lg">
⚠️ 检测到你近期有一次重要转折（建议查看）
</p>

<p class="mt-4 text-xl">
🔥 原价29.9 → 今日仅需 9.9元
</p>

<img src="weixin-pay.jpg" class="mx-auto mt-4 w-48">

<p class="mt-3 text-green-400">
✔ 支付后截图，加微信获取完整版
</p>

</div>

<script>

function start(){

  let gender = document.getElementById("gender").value;
  let age = document.getElementById("age").value;
  let marriage = document.getElementById("marriage").value;

  if(!gender || !age || !marriage){
    alert("请填写完整信息");
    return;
  }

  let steps = [
    "正在分析命理数据...",
    "匹配个人运势模型...",
    "检测近期波动...",
    "生成专属报告..."
  ];

  let i = 0;
  let loading = document.getElementById("loading");

  let timer = setInterval(()=>{
    loading.innerText = steps[i];
    i++;
    if(i >= steps.length){
      clearInterval(timer);
      showResult();
    }
  }, 800);
}

function showResult(){

  let name = document.getElementById("name").value;
  let gender = document.getElementById("gender").value;
  let age = parseInt(document.getElementById("age").value);
  let marriage = document.getElementById("marriage").value;

  let prefix = name ? name + "（" + gender + "，" + age + "岁）" : "你（" + gender + "，" + age + "岁）";

  let scoreList = ["78（中上）📈","65（波动）⚠️","88（大吉）🔥","72（平稳）🙂"];
  let score = scoreList[Math.floor(Math.random()*scoreList.length)];

  let ageHint = age < 25 ? "当前正处在人生起步阶段" :
                age < 35 ? "你正处于事业关键发展期" :
                "目前处于稳定与突破并存阶段";

  let moneyList = [
    "近期有偏财机会，但需谨慎判断",
    "财运稳定，适合保守理财",
    "有小额进账机会",
    "注意支出，避免冲动消费"
  ];

  let careerList = [
    "工作中可能出现新的机会",
    "近期压力较大，但有突破空间",
    "适合主动争取机会",
    "需注意人际关系变化"
  ];

  let love = marriage === "单身" ? "近期有桃花出现，但需要主动把握" :
             marriage === "恋爱中" ? "关系有升温趋势，但需要沟通" :
             "整体稳定，但需避免小矛盾";

  let result = `
${prefix}

运势评分：${score}

【总体】
${ageHint}，近期运势存在波动

【财运】
${moneyList[Math.floor(Math.random()*moneyList.length)]}

【事业】
${careerList[Math.floor(Math.random()*careerList.length)]}

【感情】
${love}

⚠️ 检测到你近期有一个关键机会节点（很多人会错过）
`;

  document.getElementById("result").innerText = result;
  document.getElementById("vip").classList.remove("hidden");
}

</script>

</body>
</html>
