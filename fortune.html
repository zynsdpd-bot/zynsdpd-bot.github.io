<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄学分析平台</title>

<style>
html,body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    text-align:center;
    padding:20px;
    background:#111827;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:20px;
}

.card{
    background:#1f2937;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:10px;
    white-space:pre-wrap;
    background:#0b1220;
    padding:10px;
    border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>AI玄学分析平台</h1>
</header>

<div class="container">

<!-- 基础信息 -->
<div class="card">
<h2>基础信息</h2>
<input id="name" placeholder="姓名">
<input id="year" placeholder="出生年">
<input id="month" placeholder="月">
<input id="day" placeholder="日">
<input id="hour" placeholder="时辰">
<select id="gender">
<option>男</option>
<option>女</option>
</select>
<button onclick="saveUser()">保存</button>
</div>

<!-- 免费模块 -->
<div class="card">
<h2>星座分析</h2>
<button onclick="zodiac()">生成星座</button>
<div id="zodiac" class="result"></div>
</div>

<div class="card">
<h2>塔罗牌</h2>
<button onclick="tarot()">抽牌</button>
<div id="tarot" class="result"></div>
</div>

<!-- 付费模块 -->
<div class="card">
<h2>八字深度分析（¥19.9）</h2>
<button onclick="unlock('bazi')">解锁</button>
<div id="bazi" class="result"></div>
</div>

<div class="card">
<h2>感情分析（¥9.9）</h2>
<button onclick="unlock('love')">解锁</button>
<div id="love" class="result"></div>
</div>

<div class="card">
<h2>财运分析（¥9.9）</h2>
<button onclick="unlock('money')">解锁</button>
<div id="money" class="result"></div>
</div>

</div>

<script>

let user = {};

function saveUser(){
    user.name = document.getElementById("name").value;
    user.year = document.getElementById("year").value;
    user.month = document.getElementById("month").value;
    user.day = document.getElementById("day").value;
    user.hour = document.getElementById("hour").value;
    user.gender = document.getElementById("gender").value;
    alert("已保存");
}

/* 星座 */
function zodiac(){
    const m = parseInt(user.month);
    const d = parseInt(user.day);

    let z = "";

    if((m==1&&d<=19)||(m==12&&d>=22)) z="摩羯座";
    else if((m==1&&d>=20)||(m==2&&d<=18)) z="水瓶座";
    else if((m==2&&d>=19)||(m==3&&d<=20)) z="双鱼座";
    else z="其他星座";

    document.getElementById("zodiac").innerText = "你的星座：" + z;
}

/* 塔罗 */
function tarot(){
    let cards=["愚者","魔术师","恋人","太阳","月亮"];
    let r=()=>cards[Math.floor(Math.random()*cards.length)];

    document.getElementById("tarot").innerText =
    `过去:${r()}\n现在:${r()}\n未来:${r()}`;
}

/* 付费模拟 */
function unlock(type){

    if(!user.name){
        alert("请先保存信息");
        return;
    }

    if(type=="bazi"){
        document.getElementById("bazi").innerText =
`八字分析：
性格稳重，适合长期发展
事业建议：稳定行业更佳`;
    }

    if(type=="love"){
        document.getElementById("love").innerText =
`感情分析：
慢热型感情
适合稳定关系`;
    }

    if(type=="money"){
        document.getElementById("money").innerText =
`财运分析：
正财稳定
不宜高风险投资`;
    }
}

</script>

</body>
</html>
