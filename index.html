<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>今日运势测算</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white text-center p-6">

<h1 class="text-3xl font-bold mb-4">🔮 今日运势测算</h1>
<p class="mb-6 text-gray-300">输入你的姓名，查看今天的运势变化</p>

<input id="name" placeholder="请输入姓名"
class="p-3 rounded text-black w-64">

<br><br>

<button onclick="start()" 
class="bg-purple-600 px-8 py-3 rounded text-lg">
立即测算
</button>

<!-- 过程提示 -->
<p id="loading" class="mt-6 text-yellow-400"></p>

<!-- 基础结果 -->
<div id="result" class="mt-6 text-xl"></div>

<!-- 高级诱导 -->
<div id="vip" class="mt-8 hidden">

<h2 class="text-2xl text-yellow-400">🔒 高级运势已生成</h2>

<p class="mt-4 text-gray-300">
✔ 今日财运详细分析  
✔ 事业机会判断  
✔ 感情发展趋势  
✔ 贵人/小人提醒  
</p>

<p class="mt-4 text-red-400 text-lg">
⚠️ 检测到你近期有关键转折点（建议查看）
</p>

<p class="mt-4 text-xl">👉 限时解锁：9.9元</p>

<img src="weixin-pay.jpg" class="mx-auto mt-4 w-48">

<p class="mt-3 text-green-400">
✔ 支付后截图，加微信获取完整版
</p>
<a href="contact.html"
class="block mt-4 bg-green-500 px-6 py-2 rounded">
👉 不会支付？点这里加微信
</a>
<p class="mt-2 text-sm text-gray-400">
（每天限量开放，建议尽快查看）
</p>

</div>
</div>

<!-- 右下角引流 -->
<div style="position:fixed;bottom:20px;right:20px;background:#111;padding:10px;border-radius:10px;">
<p style="font-size:12px;">👉 免费领取运势完整版</p>
<img src="weixin.jpg" width="80">
</div>

<script>
function start(){

  let name = document.getElementById("name").value;
  if(!name){
    alert("请输入姓名");
    return;
  }

  let steps = [
    "正在分析姓名能量...",
    "匹配今日运势数据...",
    "检测财运波动...",
    "生成最终结果..."
  ];

  let i = 0;
  let loading = document.getElementById("loading");

  let timer = setInterval(()=>{
    loading.innerText = steps[i];
    i++;
    if(i >= steps.length){
      clearInterval(timer);
      showResult(name);
    }
  }, 800);
}

function showResult(name){
  document.getElementById("loading").innerText = "";

  let list = [
    "运势评分：78（中上）📈",
    "运势评分：65（波动）⚠️",
    "运势评分：88（大吉）🔥",
    "运势评分：72（平稳）🙂"
  ];

  document.getElementById("result").innerText =
    name + "：" + list[Math.floor(Math.random()*list.length)];

  document.getElementById("vip").classList.remove("hidden");
}
</script>

</body>
</html>
