<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 AI全能副业中心</title>
    <style>
        :root { --p: #00ff88; --s: #8b5cf6; --bg: #0d0d0f; --card: #16161a; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* 通用卡片样式 */
        .section { background: var(--card); border: 1px solid #2d2d30; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h3 { margin-top: 0; color: var(--p); font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }

        /* 1. 命理区 - 优化输入 */
        .input-box { display: flex; flex-direction: column; gap: 10px; }
        input[type="date"] { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #444; 
            background: #222; color: #fff; font-size: 1rem; box-sizing: border-box;
        }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* 2. 转盘区 - CSS抽奖 */
        .wheel-container { text-align: center; padding: 20px 0; }
        .lucky-wheel { 
            width: 200px; height: 200px; border-radius: 50%; border: 8px solid #333;
            margin: 0 auto; position: relative; background: conic-gradient(
                #1a1a1a 0deg 60deg, #222 60deg 120deg, #1a1a1a 120deg 180deg, 
                #222 180deg 240deg, #1a1a1a 240deg 300deg, #222 300deg 360deg
            );
            transition: transform 3s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .wheel-pointer { 
            width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-top: 20px solid #ff007a; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); z-index: 5;
        }

        /* 3. 导航区 - 大按钮链接 */
        .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .link-item { 
            background: #252529; padding: 15px; border-radius: 15px; text-decoration: none; 
            color: #fff; border: 1px solid transparent; transition: 0.2s;
        }
        .link-item:active { background: #333; transform: scale(0.95); border-color: var(--p); }
        .link-item b { display: block; color: var(--p); margin-bottom: 4px; }
        .link-item span { font-size: 0.75rem; color: #888; }

        /* 按钮样式 */
        .btn { 
            background: var(--p); color: #000; border: none; padding: 15px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-s { background: var(--s); color: #fff; }

        /* 弹窗 */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; 
        }
        .modal-card { background: #1c1c1e; padding: 30px; border-radius: 25px; border: 1px solid var(--p); width: 85%; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin: 30px 0;">🚀 AI 全能副业导航</h2>

    <div class="section" style="border-color: var(--s); background: linear-gradient(145deg, #16161a, #1e1233);">
        <h3>💼 商务合作</h3>
        <p style="font-size: 0.9rem; color: #ccc; margin: 5px 0 15px;">承接推广 / 资源置换 / 合作入驻</p>
        <button class="btn btn-s" style="width: 100%;" onclick="alert('请联系微信：HarryZhang_2026')">点击获取联系方式</button>
    </div>

    <div class="section">
        <h3>🔮 赛博命理决策</h3>
        <div class="input-box">
            <input type="date" id="userDate">
            <div class="btn-group">
                <button class="btn" onclick="showResult('iching')">周易起卦</button>
                <button class="btn btn-s" onclick="showResult('tarot')">塔罗占卜</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>🎡 每日副业灵感</h3>
        <div class="wheel-container">
            <div style="position:relative; width:200px; margin:0 auto;">
                <div class="wheel-pointer"></div>
                <div id="wheel" class="lucky-wheel"></div>
            </div>
            <button class="btn" style="width: 100%; margin-top: 30px;" onclick="startSpin()">点击抽取今日方向</button>
        </div>
    </div>

    <div class="section">
        <h3>🛠️ 核心工具库 (点击直达)</h3>
        <div class="link-grid">
            <a href="https://kimi.moonshot.cn/" target="_blank" class="link-item"><b>Kimi Chat</b><span>文本分析专家</span></a>
            <a href="https://klingai.com/" target="_blank" class="link-item"><b>可灵 Kling</b><span>AI 视频生成</span></a>
            <a href="https://tongyi.aliyun.com/" target="_blank" class="link-item"><b>通义千问</b><span>全能逻辑助手</span></a>
            <a href="https://metaso.cn/" target="_blank" class="link-item"><b>秘塔搜索</b><span>深度调研神器</span></a>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-card">
        <h2 id="mTitle" style="color: var(--p);"></h2>
        <p id="mBody" style="line-height: 1.6; color: #eee; margin: 20px 0;"></p>
        <button class="btn" style="width: 100%;" onclick="document.getElementById('modal').style.display='none'">确定</button>
    </div>
</div>

<script>
    // 命理逻辑
    function showResult(type) {
        const date = document.getElementById('userDate').value;
        if (!date) { alert("请点击输入框选择日期"); return; }
        
        const title = type === 'iching' ? "🔮 周易卦象：【乾为天】" : "🃏 塔罗牌：【魔术师】";
        const body = "根据您的能量场推演：2026年4月为您事业的上升期，利于启动AI相关副业，切记保持专注，必有所成。";
        
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mBody').innerText = body;
        document.getElementById('modal').style.display = 'flex';
    }

    // 转盘逻辑
    let currentDeg = 0;
    function startSpin() {
        const wheel = document.getElementById('wheel');
        const prizes = ["AI绘画", "数字人", "SEO建站", "私域变现", "提示词工程", "外贸代运营"];
        
        currentDeg += Math.floor(Math.random() * 360 + 1800);
        wheel.style.transform = `rotate(${currentDeg}deg)`;
        
        setTimeout(() => {
            const win = prizes[Math.floor(Math.random() * prizes.length)];
            document.getElementById('mTitle').innerText = "🎡 今日建议方向";
            document.getElementById('mBody').innerText = "今日幸运赛道：【" + win + "】。建议投入2小时深入研究相关工具。";
            document.getElementById('modal').style.display = 'flex';
        }, 3200);
    }
</script>

</body>
</html>
